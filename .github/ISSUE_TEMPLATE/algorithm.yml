name: 🧮 New Algorithm / Data Structure
description: Propose adding a new algorithm or data structure to an existing package.
title: "[New]: "
labels: ["enhancement", "new-algorithm"]
assignees: []

body:
    - type: markdown
      attributes:
          value: |
              Thanks for proposing a new addition! This is a **learning project** — please read [`CONTRIBUTING.md`](https://github.com/mThanuj/dsa/blob/main/CONTRIBUTING.md) before opening this issue, especially:

              - 🧠 **No-AI policy** — the implementation must be written by *you*, not generated by an AI tool.
              - 📦 **Use existing packages** — your new `.java` files must go into a package that already exists in the repo (e.g. `io.github.mthanuj.sorting`). If you think a brand-new topic package is needed, propose it as a separate issue first.
              - ✅ **Tests are required** — JUnit 4 tests covering typical, edge, and adversarial cases.

    - type: input
      id: name
      attributes:
          label: Name of the algorithm / data structure
          description: The standard name (e.g. "Insertion Sort", "Binary Search", "Stack").
          placeholder: e.g. Insertion Sort
      validations:
          required: true

    - type: input
      id: package
      attributes:
          label: Target package (Basically the topic name, but the entire package path)
          description: The existing package you plan to add the class to. Must be one that already exists in the repo.
          placeholder: io.github.mthanuj.sorting
      validations:
          required: true

    - type: textarea
      id: problem
      attributes:
          label: Problem it solves
          description: In one or two sentences, what is this algorithm / data structure useful for?
      validations:
          required: true

    - type: textarea
      id: approach
      attributes:
          label: Proposed approach
          description: Briefly describe the algorithm or design in your own words. Don't paste code yet — explain the idea, key invariants, and any non-obvious choices.
          placeholder: |
              1. Walk through the array, finding the … for each ….
              2. Swap / place it at ….
              3. Repeat until …
      validations:
          required: true

    - type: textarea
      id: complexity
      attributes:
          label: Time and space complexity
          description: Best / average / worst time, plus space. Mention whether it's stable / in-place (for sorting) when relevant.
          placeholder: |
              - Time:  O(?) best / O(?) average / O(?) worst
              - Space: O(?)
              - Stable: yes / no
              - In-place: yes / no
      validations:
          required: true

    - type: dropdown
      id: status
      attributes:
          label: Would you like to implement it yourself?
          options:
              - Yes — I'd like to open a PR with the implementation
              - No — I'm just proposing the idea
      validations:
          required: true

    - type: textarea
      id: references
      attributes:
          label: References
          description: Textbook chapter, Wikipedia link, paper, or any other source you learned it from.
          placeholder: |
              - CLRS, Chapter 2
              - https://en.wikipedia.org/wiki/...
      validations:
          required: false

    - type: checkboxes
      id: confirm
      attributes:
          label: Checklist
          options:
              - label: I have read [`CONTRIBUTING.md`](https://github.com/mThanuj/dsa/blob/main/CONTRIBUTING.md).
              - label: I confirm the code will be written by me (no AI generation), in line with the no-AI policy.
              - label: I plan to add matching JUnit 4 tests covering typical, edge, and adversarial cases.
              - label: The target package already exists in the repo (I have not created a new topic package).
